<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f11"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AC9EF5"/>
      <stop offset="100%" stop-color="#7B6FD4"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" fill="url(#bg)" rx="16"/>

  <!-- Header accent line -->
  <rect x="40" y="40" width="60" height="4" rx="2" fill="url(#accent)"/>

  <!-- Title -->
  <text x="40" y="82" fill="#AC9EF5" font-size="14" font-weight="500" letter-spacing="3">SOURCEKIT</text>
  <text x="40" y="128" fill="#F7F7F8" font-size="38" font-weight="700" letter-spacing="-0.5">Find Engineers by</text>
  <text x="40" y="172" fill="#F7F7F8" font-size="38" font-weight="700" letter-spacing="-0.5">What They Build</text>
  <text x="40" y="205" fill="#9ca3af" font-size="15">GitHub-native talent sourcing. Not keywords. Not claims. Shipped code.</text>

  <!-- Divider -->
  <line x1="40" y1="230" x2="760" y2="230" stroke="#2d3133" stroke-width="1"/>

  <!-- HOW IT WORKS — 3 Steps -->
  <text x="40" y="265" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="2">HOW IT WORKS</text>

  <!-- Step 1 -->
  <rect x="40" y="282" width="228" height="140" rx="10" fill="#1e2023" stroke="#2d3133" stroke-width="1"/>
  <circle cx="64" cy="306" r="12" fill="url(#accent)" opacity="0.15"/>
  <text x="64" y="311" fill="#AC9EF5" font-size="13" font-weight="700" text-anchor="middle">1</text>
  <text x="84" y="311" fill="#F7F7F8" font-size="14" font-weight="600">Research</text>
  <text x="52" y="334" fill="#9ca3af" font-size="11.5" line-height="1.5">
    <tspan x="52" dy="0">Paste a job description or role.</tspan>
    <tspan x="52" dy="17">AI generates target repos,</tspan>
    <tspan x="52" dy="17">competitor companies, EEA</tspan>
    <tspan x="52" dy="17">criteria, and a role pitch.</tspan>
  </text>

  <!-- Step 2 -->
  <rect x="286" y="282" width="228" height="140" rx="10" fill="#1e2023" stroke="#2d3133" stroke-width="1"/>
  <circle cx="310" cy="306" r="12" fill="url(#green)" opacity="0.15"/>
  <text x="310" y="311" fill="#34d399" font-size="13" font-weight="700" text-anchor="middle">2</text>
  <text x="330" y="311" fill="#F7F7F8" font-size="14" font-weight="600">Search &amp; Score</text>
  <text x="298" y="334" fill="#9ca3af" font-size="11.5">
    <tspan x="298" dy="0">Mines top contributors from</tspan>
    <tspan x="298" dy="17">target repos. Claude scores</tspan>
    <tspan x="298" dy="17">each 0-100. Flags "Hidden</tspan>
    <tspan x="298" dy="17">Gems" competitors miss.</tspan>
  </text>

  <!-- Step 3 -->
  <rect x="532" y="282" width="228" height="140" rx="10" fill="#1e2023" stroke="#2d3133" stroke-width="1"/>
  <circle cx="556" cy="306" r="12" fill="url(#orange)" opacity="0.15"/>
  <text x="556" y="311" fill="#fb923c" font-size="13" font-weight="700" text-anchor="middle">3</text>
  <text x="576" y="311" fill="#F7F7F8" font-size="14" font-weight="600">Pipeline &amp; Outreach</text>
  <text x="544" y="334" fill="#9ca3af" font-size="11.5">
    <tspan x="544" dy="0">Kanban board tracks stages.</tspan>
    <tspan x="544" dy="17">AI writes personalized</tspan>
    <tspan x="544" dy="17">outreach referencing their</tspan>
    <tspan x="544" dy="17">actual GitHub contributions.</tspan>
  </text>

  <!-- Divider -->
  <line x1="40" y1="445" x2="760" y2="445" stroke="#2d3133" stroke-width="1"/>

  <!-- BUILDER SCORE -->
  <text x="40" y="480" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="2">BUILDER SCORE — 7 DIMENSIONS</text>
  <text x="40" y="500" fill="#6b7280" font-size="11">All from GitHub activity. Zero self-reported data.</text>

  <!-- Score bars -->
  <!-- AI Mastery 30% -->
  <text x="40" y="530" fill="#d1d5db" font-size="12" font-weight="500">AI Mastery</text>
  <text x="200" y="530" fill="#6b7280" font-size="11">30%</text>
  <rect x="240" y="519" width="300" height="14" rx="4" fill="#1e2023"/>
  <rect x="240" y="519" width="230" height="14" rx="4" fill="url(#accent)" opacity="0.8"/>

  <!-- Build Velocity 20% -->
  <text x="40" y="554" fill="#d1d5db" font-size="12" font-weight="500">Build Velocity</text>
  <text x="200" y="554" fill="#6b7280" font-size="11">20%</text>
  <rect x="240" y="543" width="300" height="14" rx="4" fill="#1e2023"/>
  <rect x="240" y="543" width="175" height="14" rx="4" fill="url(#green)" opacity="0.7"/>

  <!-- Tooling 15% -->
  <text x="40" y="578" fill="#d1d5db" font-size="12" font-weight="500">Tooling</text>
  <text x="200" y="578" fill="#6b7280" font-size="11">15%</text>
  <rect x="240" y="567" width="300" height="14" rx="4" fill="#1e2023"/>
  <rect x="240" y="567" width="140" height="14" rx="4" fill="url(#orange)" opacity="0.7"/>

  <!-- Commit Quality 15% -->
  <text x="40" y="602" fill="#d1d5db" font-size="12" font-weight="500">Commit Quality</text>
  <text x="200" y="602" fill="#6b7280" font-size="11">15%</text>
  <rect x="240" y="591" width="300" height="14" rx="4" fill="#1e2023"/>
  <rect x="240" y="591" width="140" height="14" rx="4" fill="url(#pink)" opacity="0.7"/>

  <!-- Testing, Docs, Community (smaller) -->
  <text x="40" y="626" fill="#9ca3af" font-size="11">Testing 10%</text>
  <text x="160" y="626" fill="#9ca3af" font-size="11">Documentation 8%</text>
  <text x="320" y="626" fill="#9ca3af" font-size="11">Community Health 7%</text>

  <!-- Divider -->
  <line x1="40" y1="650" x2="760" y2="650" stroke="#2d3133" stroke-width="1"/>

  <!-- EEA FRAMEWORK -->
  <text x="40" y="685" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="2">EEA FRAMEWORK — EVIDENCE OF EXCEPTIONAL ABILITY</text>

  <!-- Two columns -->
  <!-- Left: USCIS Criteria -->
  <rect x="40" y="702" width="350" height="155" rx="10" fill="#1e2023" stroke="#2d3133" stroke-width="1"/>
  <text x="56" y="726" fill="#AC9EF5" font-size="12" font-weight="600">USCIS Criteria (60%)</text>
  <text x="56" y="748" fill="#9ca3af" font-size="11">
    <tspan x="56" dy="0">Original contributions of major significance</tspan>
    <tspan x="56" dy="17">Critical role in distinguished organizations</tspan>
    <tspan x="56" dy="17">Published material &amp; expert recognition</tspan>
    <tspan x="56" dy="17">Judging &amp; peer review activities</tspan>
    <tspan x="56" dy="17">High salary / remuneration evidence</tspan>
    <tspan x="56" dy="17">Membership in exclusive associations</tspan>
  </text>

  <!-- Right: Supplementary -->
  <rect x="410" y="702" width="350" height="155" rx="10" fill="#1e2023" stroke="#2d3133" stroke-width="1"/>
  <text x="426" y="726" fill="#34d399" font-size="12" font-weight="600">Supplementary Signals (40%)</text>
  <text x="426" y="748" fill="#9ca3af" font-size="11">
    <tspan x="426" dy="0">Sustained technical excellence</tspan>
    <tspan x="426" dy="17">Technical depth + breadth</tspan>
    <tspan x="426" dy="17">Velocity &amp; trajectory</tspan>
    <tspan x="426" dy="17">Builder DNA — prolific shipping</tspan>
    <tspan x="426" dy="17">Early mover on emerging tech</tspan>
  </text>

  <!-- Tier scale -->
  <text x="40" y="890" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="2">STRENGTH TIERS</text>
  <rect x="40" y="904" width="120" height="28" rx="6" fill="#1e2023" stroke="#374151" stroke-width="1"/>
  <text x="100" y="923" fill="#6b7280" font-size="11" font-weight="500" text-anchor="middle">Not Detected</text>

  <rect x="172" y="904" width="120" height="28" rx="6" fill="#1e2023" stroke="#4b5563" stroke-width="1"/>
  <text x="232" y="923" fill="#9ca3af" font-size="11" font-weight="500" text-anchor="middle">Emerging</text>

  <rect x="304" y="904" width="120" height="28" rx="6" fill="#1e2023" stroke="#fb923c" stroke-width="1"/>
  <text x="364" y="923" fill="#fb923c" font-size="11" font-weight="500" text-anchor="middle">Moderate</text>

  <rect x="436" y="904" width="120" height="28" rx="6" fill="#1e2023" stroke="#34d399" stroke-width="1"/>
  <text x="496" y="923" fill="#34d399" font-size="11" font-weight="500" text-anchor="middle">Strong</text>

  <rect x="568" y="904" width="120" height="28" rx="6" fill="url(#accent)" opacity="0.2" stroke="#AC9EF5" stroke-width="1"/>
  <text x="628" y="923" fill="#AC9EF5" font-size="11" font-weight="600" text-anchor="middle">Exceptional</text>

  <!-- Divider -->
  <line x1="40" y1="952" x2="760" y2="952" stroke="#2d3133" stroke-width="1"/>

  <!-- BEST PRACTICES -->
  <text x="40" y="985" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="2">BEST PRACTICES</text>

  <!-- Tips -->
  <circle cx="52" cy="1010" r="4" fill="#34d399"/>
  <text x="66" y="1014" fill="#d1d5db" font-size="12">Edit the repo list — single biggest lever for result quality</text>

  <circle cx="52" cy="1034" r="4" fill="#34d399"/>
  <text x="66" y="1038" fill="#d1d5db" font-size="12">Target Hidden Gems — high contributions + low followers = under-recruited</text>

  <circle cx="52" cy="1058" r="4" fill="#34d399"/>
  <text x="66" y="1062" fill="#d1d5db" font-size="12">Use Websets for ongoing sourcing — new matches auto-enter your pipeline</text>

  <!-- Footer -->
  <text x="40" y="1090" fill="#4b5563" font-size="10">getsourcekit.vercel.app  ·  sourcekit-docs.netlify.app  ·  March 2026</text>
</svg>
